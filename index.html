<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Worksheet</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

  <!-- Login -->
  <div id="halamanLogin" class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-xl shadow-lg w-full max-w-md p-6">
      <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-blue-700">🏨 Hotel Worksheet</h1>
        <p class="text-gray-500 mt-1">Silakan masuk ke akun Anda</p>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input type="text" id="user" class="w-full border border-gray-300 rounded-lg px-3 py-2" placeholder="Masukkan username">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="pass" class="w-full border border-gray-300 rounded-lg px-3 py-2" placeholder="Masukkan password">
        </div>
        <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg">Masuk</button>
        <div id="pesanLogin" class="text-center text-sm mt-2 hidden"></div>
      </div>
    </div>
  </div>

  <!-- Supervisor -->
  <div id="halamanSupervisor" class="hidden max-w-4xl mx-auto p-4">
    <div class="bg-white rounded-lg shadow p-4 mb-4 flex justify-between items-center">
      <h2 class="text-xl font-bold text-gray-800">📋 Pembagian Tugas</h2>
      <button onclick="keluar()" class="text-red-600">Keluar</button>
    </div>
    <div class="bg-white rounded-lg shadow p-4 mb-4 grid grid-cols-1 sm:grid-cols-4 gap-3">
      <div><label>Tanggal</label><input type="date" id="supTanggal" class="w-full border p-2 rounded mt-1"></div>
      <div><label>Shift</label><select id="supShift" class="w-full border p-2 rounded mt-1"><option value="Pagi">Pagi</option><option value="Siang">Siang</option><option value="Sore">Sore</option><option value="Malam">Malam</option></select></div>
      <div><label>Lantai</label><input type="text" id="supLantai" class="w-full border p-2 rounded mt-1" placeholder="5"></div>
      <div><label>Nama Petugas</label><input type="text" id="supNama" class="w-full border p-2 rounded mt-1" placeholder="Nama"></div>
    </div>
    <div class="bg-white rounded-lg shadow p-4 mb-4">
      <button onclick="tambahBaris()" class="bg-blue-500 text-white px-3 py-1.5 rounded mr-2">+ Tambah Kamar</button>
      <button onclick="simpanTugas()" class="bg-green-600 text-white px-3 py-1.5 rounded">💾 Simpan Semua</button>
      <table class="w-full mt-4 text-sm"><thead class="bg-gray-100"><tr><th class="p-2 border">No</th><th class="p-2 border">No Kamar</th><th class="p-2 border">Status</th><th class="p-2 border">Tiba</th><th class="p-2 border">Berangkat</th><th class="p-2 border">Hapus</th></tr></thead><tbody id="tabelTugas"></tbody></table>
    </div>
  </div>

  <!-- Roomboy -->
  <div id="halamanRoomboy" class="hidden max-w-xl mx-auto p-4">
    <div class="bg-white rounded-lg shadow p-4 mb-4 flex justify-between items-center">
      <h2 class="text-lg font-bold text-gray-800">🛏️ My Worksheet</h2>
      <button onclick="keluar()" class="text-red-600">Keluar</button>
    </div>
    <div class="bg-white rounded-lg shadow p-4 mb-4">
      <div class="grid grid-cols-3 gap-3 mb-3">
        <div><label>Tanggal</label><input type="date" id="rbTanggal" class="w-full border p-1.5 rounded mt-1"></div>
        <div><label>Shift</label><select id="rbShift" class="w-full border p-1.5 rounded mt-1"><option value="Pagi">Pagi</option><option value="Siang">Siang</option><option value="Sore">Sore</option><option value="Malam">Malam</option></select></div>
        <div><label>Nama</label><input type="text" id="rbNama" class="w-full border p-1.5 rounded mt-1" readonly></div>
      </div>
      <button onclick="ambilTugasRB()" class="w-full bg-blue-600 text-white py-2 rounded">📂 Ambil Daftar Kamar</button>
    </div>
    <div id="daftarKamarRB"></div>
  </div>

  <script>
    // 👇 GANTI DENGAN URL ANDA
    const URL_GAS = "https://script.google.com/macros/s/AKfycbwTgZAGmd3woHP9WSuvXWyk7jWcSGmI3cETVQqFnuIZEjFSFiQHQtW3Y-Nj1EocH1Xv/exec";

    let nomorBaris = 1;
    let pengguna = {};

    // --- LOGIN ---
    function login() {
      const user = document.getElementById("user").value.trim();
      const pass = document.getElementById("pass").value.trim();
      const pesan = document.getElementById("pesanLogin");
      pesan.classList.add("hidden");

      if (!user || !pass) {
        pesan.textContent = "❌ Isi username & password!";
        pesan.className = "text-center text-sm text-red-500 mt-2";
        pesan.classList.remove("hidden");
        return;
      }

      pesan.textContent = "⏳ Memproses...";
      pesan.className = "text-center text-sm text-blue-500 mt-2";
      pesan.classList.remove("hidden");

      // Pakai FormData = paling kompatibel
      const form = new FormData();
      form.append("fungsi", "login");
      form.append("user", user);
      form.append("pass", pass);

      fetch(URL_GAS, { method: "POST", body: form, redirect: "follow" })
        .then(res => res.json())
        .then(hasil => {
          if (hasil.status === "ok") {
            pesan.textContent = "✅ Berhasil masuk!";
            pesan.className = "text-center text-sm text-green-500 mt-2";
            pengguna = { nama: hasil.nama, peran: hasil.peran };
            setTimeout(() => {
              if (hasil.peran === "Supervisor") tampilkanHalaman("Supervisor");
              else { document.getElementById("rbNama").value = hasil.nama; tampilkanHalaman("Roomboy"); }
            }, 800);
          } else {
            pesan.textContent = "❌ " + hasil.pesan;
            pesan.className = "text-center text-sm text-red-500 mt-2";
          }
        })
        .catch(err => {
          pesan.textContent = "❌ Gagal terhubung! Cek URL & izin.";
          pesan.className = "text-center text-sm text-red-500 mt-2";
          console.error(err);
        });
    }

    function tampilkanHalaman(peran) {
      document.getElementById("halamanLogin").classList.add("hidden");
      document.getElementById("halamanSupervisor").classList.add("hidden");
      document.getElementById("halamanRoomboy").classList.add("hidden");
      if (peran === "Supervisor") document.getElementById("halamanSupervisor").classList.remove("hidden");
      else document.getElementById("halamanRoomboy").classList.remove("hidden");
    }

    function keluar() {
      pengguna = {};
      document.getElementById("halamanLogin").classList.remove("hidden");
      document.getElementById("user").value = "";
      document.getElementById("pass").value = "";
    }

    // --- Supervisor ---
    function tambahBaris() {
      const tr = document.createElement("tr");
      tr.className = "border-b";
      tr.innerHTML = `<td class="p-2">${nomorBaris++}</td><td class="p-2"><input type="text" class="w-20 border p-1 rounded"></td><td class="p-2"><select class="border p-1 rounded"><option value="VC">VC</option><option value="VD">VD</option><option value="OC">OC</option><option value="OD">OD</option><option value="DND">DND</option><option value="OOO">OOO</option></select></td><td class="p-2"><input type="date" class="w-28 border p-1 rounded"></td><td class="p-2"><input type="date" class="w-28 border p-1 rounded"></td><td class="p-2 text-center"><button onclick="hapusBaris(this)" class="text-red-500">×</button></td>`;
      document.querySelector("#tabelTugas tbody").appendChild(tr);
    }

    function hapusBaris(btn) { btn.closest("tr").remove(); nomorBaris--; }

    function simpanTugas() {
      const tanggal = document.getElementById("supTanggal").value;
      const shift = document.getElementById("supShift").value;
      const lantai = document.getElementById("supLantai").value;
      const nama = document.getElementById("supNama").value;
      const baris = document.querySelectorAll("#tabelTugas tr");
      if (!tanggal || !nama) return alert("Lengkapi data!");

      const data = [];
      baris.forEach(tr => {
        const kolom = tr.querySelectorAll("input, select");
        if (kolom[0].value) data.push({ tanggal, shift, lantai, nama, noKamar: kolom[0].value, status: kolom[1].value, arr: kolom[2].value, dep: kolom[3].value });
      });

      const form = new FormData();
      form.append("fungsi", "simpanTugas");
      form.append("data", JSON.stringify(data));
      fetch(URL_GAS, { method: "POST", body: form, redirect: "follow" })
        .then(res => res.json())
        .then(hasil => { alert(hasil.pesan); document.querySelector("#tabelTugas tbody").innerHTML = ""; nomorBaris = 1; })
        .catch(() => alert("Gagal menyimpan!"));
    }

    // --- Roomboy ---
    function ambilTugasRB() {
      const tanggal = document.getElementById("rbTanggal").value;
      const shift = document.getElementById("rbShift").value;
      const nama = document.getElementById("rbNama").value;
      if (!tanggal) return alert("Pilih tanggal!");

      const form = new FormData();
      form.append("fungsi", "ambilTugas");
      form.append("tanggal", tanggal);
      form.append("shift", shift);
      form.append("nama", nama);

      fetch(URL_GAS, { method: "POST", body: form, redirect: "follow" })
        .then(res => res.json())
        .then(daftar => {
          const wadah = document.getElementById("daftarKamarRB");
          wadah.innerHTML = "";
          if (daftar.length === 0) return wadah.innerHTML = "<p class='text-center p-4 text-gray-500'>Belum ada tugas</p>";
          daftar.forEach(kamar => {
            const blok = document.createElement("div");
            blok.className = "bg-white rounded-lg shadow mb-4 p-4";
            blok.innerHTML = `
              <div class="flex justify-between items-center mb-3">
                <div><h3 class="text-2xl font-bold">${kamar.noKamar}</h3><p class="text-sm text-gray-500">Lantai ${kamar.lantai}</p></div>
                <span class="px-3 py-1 rounded-full bg-blue-100 text-blue-800">${kamar.statusAwal}</span>
              </div>
              <div class="text-sm mb-3">📅 Tiba: ${kamar.arr} &nbsp;&nbsp; ✈️ Berangkat: ${kamar.dep}</div>
              <div class="mb-3">Status: <select class="statusAkhir border p-1 rounded"><option value="VC">VC</option><option value="VD">VD</option><option value="OC">OC</option><option value="OD">OD</option><option value="DND">DND</option></select> Mulai: <input type="time" class="jamMulai w-20 border p-1 rounded"> Selesai: <input type="time" class="jamSelesai w-20 border p-1 rounded"></div>
              <h4 class="font-semibold mb-2">🧺 Linen</h4>
              <div class="grid grid-cols-2 gap-2 text-sm mb-3">
                <div>Sprei Double</div><select class="spreiD border p-1 rounded"><option value="0">0</option><option value="1">1</option><option value="2">2</option></select>
                <div>Sprei Single</div><select class="spreiS border p-1 rounded"><option value="0">0</option><option value="1">1</option><option value="2">2</option></select>
                <div>Selimut</div><select class="selimut border p-1 rounded"><option value="0">0</option><option value="1">1</option><option value="2">2</option></select>
                <div>Handuk Mandi</div><select class="handukM border p-1 rounded"><option value="0">0</option><option value="1">1</option><option value="2">2</option></select>
                <div>Handuk Wajah</div><select class="handukW border p-1 rounded"><option value="0">0</option><option value="1">1</option><option value="2">2</option></select>
                <div>Alas Mandi</div><select class="alas border p-1 rounded"><option value="0">0</option><option value="1">1</option><option value="2">2</option></select>
                <div>Sarung Bantal</div><select class="bantal border p-1 rounded"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="4">4</option></select>
              </div>
              <h4 class="font-semibold mb-2">🧴 Amenitas</h4>
              <div class="grid grid-cols-2 gap-2 text-sm mb-3">
                <div>Tisu</div><select class="tisu border p-1 rounded"><option value="0">0</option><option value="1">1</option></select>
                <div>Sabun</div><select class="sabun border p-1 rounded"><option value="0">0</option><option value="1">1</option></select>
                <div>Sampo</div><select class="sampo border p-1 rounded"><option value="0">0</option><option value="1">1</option></select>
                <div>Air Minum</div><select class="air border p-1 rounded"><option value="0">0</option><option value="1">1</option><option value="2">2</option></select>
                <div>Teh/Kopi</div><select class="teh border p-1 rounded"><option value="0">0</option><option value="1">1</option><option value="2">2</option></select>
              </div>
              <input type="text" class="keterangan w-full border p-2 rounded mb-3" placeholder="Catatan">
              <button onclick="simpanKamar(this, '${kamar.noKamar}')" class="w-full bg-green-600 text-white py-2 rounded">✅ Simpan Selesai</button>
            `;
            wadah.appendChild(blok);
          });
        })
        .catch(() => alert("Gagal memuat tugas!"));
    }

    function simpanKamar(tombol, noKamar) {
      const blok = tombol.closest(".bg-white");
      const data = {
        tanggal: document.getElementById("rbTanggal").value,
        shift: document.getElementById("rbShift").value,
        lantai: blok.querySelector("p").textContent.replace("Lantai ", ""),
        nama: document.getElementById("rbNama").value,
        noKamar: noKamar,
        status: blok.querySelector(".statusAkhir").value,
        jamMulai: blok.querySelector(".jamMulai").value || "-",
        jamSelesai: blok.querySelector(".jamSelesai").value || "-",
        spreiD: blok.querySelector(".spreiD").value,
        spreiS: blok.querySelector(".spreiS").value,
        selimut: blok.querySelector(".selimut").value,
        handukM: blok.querySelector(".handukM").value,
        handukW: blok.querySelector(".handukW").value,
        alas: blok.querySelector(".alas").value,
        bantal: blok.querySelector(".bantal").value,
        tisu: blok.querySelector(".tisu").value,
        sabun: blok.querySelector(".sabun").value,
        sampo: blok.querySelector(".sampo").value,
        air: blok.querySelector(".air").value,
        teh: blok.querySelector(".teh").value,
        keterangan: blok.querySelector(".keterangan").value
      };

      const form = new FormData();
      form.append("fungsi", "simpanLaporan");
      form.append("data", JSON.stringify(data));
      fetch(URL_GAS, { method: "POST", body: form, redirect: "follow" })
        .then(res => res.json())
        .then(hasil => { alert(hasil.pesan); tombol.textContent = "✅ Sudah Disimpan"; tombol.disabled = true; tombol.classList.add("bg-gray-400"); })
        .catch(() => alert("Gagal menyimpan laporan!"));
    }

    tambahBaris();
  </script>
</body>
</html>
